<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bagFront" x1="120" y1="160" x2="520" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF0E66"/>
      <stop offset="0.55" stop-color="#B10078"/>
      <stop offset="1" stop-color="#3B005F"/>
    </linearGradient>
    <linearGradient id="bagSide" x1="70" y1="210" x2="255" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFB21A"/>
      <stop offset="1" stop-color="#FF7A00"/>
    </linearGradient>
    <linearGradient id="bagTop" x1="148" y1="177" x2="405" y2="177" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2A003B"/>
      <stop offset="1" stop-color="#5D006E"/>
    </linearGradient>
    <linearGradient id="wearGrad" x1="720" y1="585" x2="1250" y2="585" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF7A00"/>
      <stop offset="1" stop-color="#FF0E66"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="620" y1="650" x2="1320" y2="650" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF7A00"/>
      <stop offset="1" stop-color="#B10078"/>
    </linearGradient>
    <filter id="softShadow" x="40" y="130" width="560" height="690" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- transparent background -->

  <!-- Shopping bag -->
  <g filter="url(#softShadow)">
    <!-- left side -->
    <path d="M90 245 L148 252 L210 685 L120 727 Z" fill="url(#bagSide)"/>
    <!-- front -->
    <path d="M148 252 L405 170 L500 600 L210 740 Z" fill="url(#bagFront)"/>
    <!-- top lip -->
    <path d="M148 252 L405 170 L344 160 L90 245 Z" fill="url(#bagTop)"/>

    <!-- seams -->
    <path d="M148 252 L210 740" stroke="#FF4A32" stroke-width="3" opacity="0.8"/>
    <path d="M90 245 L120 727" stroke="#FFCF66" stroke-width="2" opacity="0.55"/>
    <path d="M405 170 L500 600" stroke="#720049" stroke-width="2" opacity="0.45"/>

    <!-- handles -->
    <path d="M188 214 C185 165, 250 148, 265 199 L278 284" stroke="#161616" stroke-width="9" stroke-linecap="round" fill="none"/>
    <circle cx="278" cy="284" r="10" fill="#161616"/>
    <path d="M252 205 C250 153, 319 141, 333 190 L345 258" stroke="#161616" stroke-width="9" stroke-linecap="round" fill="none"/>
    <circle cx="345" cy="258" r="10" fill="#161616"/>

    <!-- gold V -->
    <path d="M214 380
             C245 363, 311 358, 416 353
             C381 365, 340 387, 316 472
             C290 566, 248 603, 180 610
             C236 588, 278 530, 296 441
             C278 434, 254 425, 214 380 Z"
          fill="#F6D783"/>
    <path d="M278 388
             C311 368, 355 364, 394 364
             C345 392, 323 430, 304 507
             C285 581, 254 616, 205 623
             C246 598, 273 546, 289 484
             C299 442, 303 416, 278 388 Z"
          fill="#C98A0B" opacity="0.28"/>
  </g>

  <!-- Brand name -->
  <g>
    <text x="560" y="520"
          font-family="Georgia, Times New Roman, serif"
          font-size="250"
          font-weight="700"
          letter-spacing="2"
          fill="#4E0A6D">VELUNE</text>

    <line x1="640" y1="610" x2="820" y2="610" stroke="url(#lineGrad)" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
    <line x1="1240" y1="610" x2="1420" y2="610" stroke="url(#lineGrad)" stroke-width="4" stroke-linecap="round" opacity="0.8"/>

    <text x="860" y="640"
          text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="98"
          font-weight="700"
          letter-spacing="28"
          fill="url(#wearGrad)">WEAR</text>
  </g>
</svg>
